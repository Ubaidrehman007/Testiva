<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
  <main class="container">
    <div class="card shadow mt-4 mb-5">
      <div class="card-header py-3 bg-primary text-white text-center">
        <h4>Question Bank</h4>
      </div>

      <div class="card-body">
        <div class="table-responsive">
          <table id="myTable" class="table table-bordered table-hover mt-2">
            <thead class="table-secondary text-center">
              <tr>
                <th>Sr. No.</th>
                <th>Question</th>
                <th>Option A</th>
                <th>Option B</th>
                <th>Option C</th>
                <th>Option D</th>
                <th>Correct</th>
                <th>Course</th>
                <th>Branch</th>
                <th>Year</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="qb, srno : ${questionList}">
                <td class="text-center" th:text="${srno.index + 1}"></td>
                <td th:text="${qb.question}"></td>
                <td th:text="${qb.a}"></td>
                <td th:text="${qb.b}"></td>
                <td th:text="${qb.c}"></td>
                <td th:text="${qb.d}"></td>
                <td th:text="${qb.correct}"></td>
                <td th:text="${qb.course}"></td>
                <td th:text="${qb.branch}"></td>
                <td th:text="${qb.year}"></td>
                <td class="text-center">
                  <a th:href="@{DeleteQuestion(id=${qb.id})}"
                     class="btn btn-danger btn-sm"
                     onclick="return confirm('Are you sure you want to delete this question?');">
                    <i class="bi bi-trash"></i> Delete
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <style>
      th, td {
        white-space: nowrap;
      }
    </style>
    
    <input type="hidden" id="msg" th:if="${msg}" th:value ="${msg}">
        <script type="text/javascript">
        var msg = document.getElementById("msg");
        if(msg.value!="")
        	{
        	alert(msg.value);
        	}
        
        </script>
    
  </main>
</body>
</html>
