<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
	th:replace="~{Admin/Adminbase::layout(~{::main})}">

<body>
	<main class="form-section">
		<form th:action="@{EditTest}" th:object="${testInfo}" method="post">
			<input type="hidden" name="id" th:value="${testInfo.id}">
			<h4>
				<i class="bi bi-pencil-square"></i> Edit Scheduled Test
			</h4>

			<!-- Readonly Fields -->
			<div class="row g-3 mb-3">
				<div class="col-md-6">
					<label class="form-label">Test Name</label> <input type="text"
						class="form-control" name="testName"
						th:value="${testInfo.testName}" readonly>
				</div>
				<div class="col-md-6">
					<label class="form-label">Test ID</label> <input type="hidden"
						class="form-control" name="testId" th:value="${testInfo.testId}"
						readonly>
				</div>
			</div>

			<div class="row g-3 mb-3">
				<div class="col-md-4">
					<label class="form-label">Course</label> <input type="text"
						class="form-control" name="course" th:value="${testInfo.course}"
						readonly>
				</div>
				<div class="col-md-4">
					<label class="form-label">Branch</label> <input type="text"
						class="form-control" name="branch" th:value="${testInfo.branch}"
						readonly>
				</div>
				<div class="col-md-4">
					<label class="form-label">Year</label> <input type="text"
						class="form-control" name="year" th:value="${testInfo.year}"
						readonly>
				</div>
			</div>

			<div class="mb-3">
				<label class="form-label">Total Questions</label> <input type="text"
					class="form-control" name="numberOfQuestion"
					th:value="${testInfo.numberOfQuestion}" readonly>
			</div>

			<!-- Editable Fields -->
			<div class="row g-3 mb-3">
				<div class="col-md-6">
					<label class="form-label">Test Duration (in hours)</label> <input
						type="number" class="form-control" name="testDuration"
						th:value="${testInfo.testDuration}" min="1" required>
				</div>
				<div class="col-md-6">
					<label class="form-label">Start Time</label> <input
						type="datetime-local" class="form-control" name="startTime"
						th:value="${testInfo.startTime}" required>
				</div>
			</div>

			<div class="mb-3">
				<label class="form-label">Status</label> <select class="form-select"
					name="status" required>
					<option th:selected="${testInfo.status == 'Scheduled'}"
						value="Scheduled">Scheduled</option>
					<option th:selected="${testInfo.status == 'Active'}" value="Active">Active</option>
					<option th:selected="${testInfo.status == 'Reminder_Sent'}"
						value="Reminder_Sent">Reminder Sent</option>
					<option th:selected="${testInfo.status == 'Test_Over'}"
						value="Test_Over">Test Over</option>
				</select>
			</div>

			<div class="text-center mt-4">
				<button type="submit" class="btn btn-success">
					<i class="bi bi-check-circle me-1"></i> Save Changes
				</button>
			</div>
		</form>
		<style>
body {
	font-family: 'Poppins', sans-serif;
	background-color: #eef2f7;
}

.form-section {
	max-width: 850px;
	margin: 50px auto;
	background: #fff;
	padding: 40px;
	border-radius: 16px;
	box-shadow: 0 8px 26px rgba(0, 0, 0, 0.08);
	border-top: 6px solid #0d6efd;
}

.form-section h4 {
	font-weight: 600;
	color: #0d6efd;
	font-size: 1.6rem;
	margin-bottom: 25px;
	display: flex;
	align-items: center;
}

.form-section h4 i {
	margin-right: 10px;
	font-size: 1.3rem;
}

.form-label {
	font-weight: 500;
	color: #333;
	margin-bottom: 6px;
}

.form-control {
	border-radius: 10px;
	transition: all 0.2s ease-in-out;
	box-shadow: none;
}

.form-control:focus {
	box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.2);
}

.form-control[readonly] {
	background-color: #f4f6f9;
	color: #6c757d;
}

.form-select {
	border-radius: 10px;
}

.btn-success {
	border-radius: 10px;
	padding: 10px 24px;
	font-weight: 500;
	box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
	transition: all 0.3s ease;
}

.btn-success:hover {
	background-color: #218838;
	transform: scale(1.02);
}

@media ( max-width : 768px) {
	.form-section {
		padding: 25px;
		margin: 20px;
	}
	.form-section h4 {
		font-size: 1.4rem;
	}
}
</style>

		

	</main>


</body>
</html>
