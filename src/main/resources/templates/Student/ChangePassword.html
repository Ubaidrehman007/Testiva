<html th:replace="~{Student/studentbase::layout(~{::main})}">
<head> 
<title>Change Password</title>



 
</head>
<body>

<main class="container d-flex justify-content-center align-items-center vh-100">
<style>
    .eye-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
    }
    .form-group {
      position: relative;
    }
  </style>

 
  <div class="card p-4 shadow-lg" style="max-width: 450px; width: 100%;">
    <h3 class="text-center text-primary mb-3">🔐 Change Password</h3>

    <form  method="post">
      <!-- Current Password -->
      <div class="mb-3 form-group">
        <label for="currentPassword" class="form-label">Current Password</label>
        <input type="password" placeholder="Current password" class="form-control" id="currentPassword" name="currentPassword" required>
        <i  onclick="togglePassword('currentPassword', this)"></i>
      </div>

      <!-- New Password -->
      <div class="mb-3 form-group">
        <label for="newPassword" class="form-label">New Password</label>
        <input type="password" placeholder="New password" class="form-control" id="newPassword" name="newPassword" required>
        <i  onclick="togglePassword('newPassword', this)"></i>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3 form-group">
        <label for="confirmPassword" class="form-label">Confirm New Password</label>
        <input type="password" placeholder="Confirm password" class="form-control" id="confirmPassword" name="confirmPassword" required>
        <i  onclick="togglePassword('confirmPassword', this)"></i>
      </div>

      <!-- Submit Button -->
      <div class="d-grid">
        <button type="submit" class="btn btn-success fw-bold">✨ Update Password</button>
      </div>
    </form>

    <div class="text-center mt-3">
      <a href="/Dashboard" class="text-decoration-none text-secondary">← Back to Dashboard</a>
    </div>
  </div>
  
  
<!-- JavaScript for show/hide password -->
 <input type="hidden" id="msg" th:if="${msg}" th:value ="${msg}">
        <script type="text/javascript">
        var msg = document.getElementById("msg");
        if(msg.value!="")
        	{
        	alert(msg.value);
        	}
        </script>
  
</main>


<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
