<html  th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
    <main class="container">
        <div class="card shadow-lg w-75 mx-auto">
            <div class="card-header bg-primary text-white">
                <h4>Add New Question</h4>
            </div>
            <div class="card-body">
                <form th:action="@{UploadQuestion}" th:object="${questionBank}" method="post" enctype="multipart/form-data">
                    <!-- Correct Answer -->
                    <div class="mb-3">
                        <label for="correct" class="form-label">Upload Question in Excel Formate:</label>
                         <input type="file" accept=".csv" name="questionFile" class="form-control" placeholder="Upload File" required>
                    </div>

                    <!-- Course, Branch, Year -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="course" class="form-label">Course:</label>
                            <select th:field="*{course}" class="form-select" id="course" required>
                        		<option value="" selected disabled>Select Course</option>
                        		<option value="B.Tech">B.Tech</option>
                       			<option value="M.Tech">M.Tech</option>
                        		<option value="BCA">BCA</option>
                        		<option value="MCA">MCA</option>   
                        		<option value="Diploma">Diploma</option>  
                    		</select>                        
                    	</div>
                        <div class="col-md-4">
                            <label for="branch" class="form-label">Branch:</label>
                            <select th:field="*{branch}" class="form-select" id="branch" required>
                        		<option value="" selected disabled>--Select Branch--</option>
                        		<option value="Computer Science">Computer Science</option>
                        		<option value="Electrical">Electrical</option>
                        		<option value="Electronics">Electronics</option>
                    		</select>
                        </div>
                        <div class="col-md-4">
                            <label for="year" class="form-label">Year:</label>
                            <select th:field="*{year}" class="form-select" id="year" required>
                        		<option value="" selected disabled>Select Year</option>
                        		<option value="First Year">First Year</option>
                        		<option value="Second Year">Second Year</option>
                        		<option value="Third Year">Third Year</option>
                        		<option value="Fourth Year">Fourth Year</option>
                    		</select>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Add Question</button>
                    </div>
                </form>
            </div>
        </div>
        
        <input type="hidden" id="msg" th:if="${msg}" th:value ="${msg}">
        <script type="text/javascript">
        var msg = document.getElementById("msg");
        if(msg.value!="")
        	{
        	alert(msg.value);
        	}
        
        </script>
        
    </main>
</body>
</html>
