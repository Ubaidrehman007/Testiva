<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{Admin/Adminbase::layout(~{::main})}">
<body>
  <main class="container">
    <div class="card shadow mt-4 mb-5">
      <div class="card-header py-3 bg-primary text-white text-center">
        <h4>Manage Enquiries</h4>
      </div>

      <div class="card-body">
        <div class="table-responsive">
          <table id="myTable" class="table table-bordered table-hover mt-2">
            <thead class="table-secondary text-center">
              <tr>
                <th>Sr. No.</th>
                <th>Name</th>
                <th>Gender</th>
                <th>Enquiry Text</th>
                <th>Enquiry Date</th>
                <th>Email</th>
                <th>Contact No.</th>
                <th>Address</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="enquiry, srno : ${enquiryList}">
                <td class="text-center" th:text="${srno.index + 1}"></td>
                <td th:text="${enquiry.name}"></td>
                <td th:text="${enquiry.gender}"></td>
                <td th:text="${enquiry.enquirytext}"></td>
                <td th:text="${enquiry.enquirydate}"></td>
                <td th:text="${enquiry.email}"></td>
                <td th:text="${enquiry.contactno}"></td>
                <td th:text="${enquiry.address}"></td>
                <td class="text-center">
                  <a th:href="@{DeleteEnquiry(id=${enquiry.id})}"
                     class="btn btn-danger btn-sm"
                     onclick="return confirm('Are you sure you want to delete this enquiry?');">
                    <i class="bi bi-trash"></i> Delete
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ✅ Minor Styling Fix -->
    <style>
      th, td {
        white-space: nowrap;
      }
    </style>

    <!-- ✅ Optional Message Handler -->
    <input type="hidden" id="msg" th:if="${msg}" th:value="${msg}">
    <script type="text/javascript">
      var msg = document.getElementById("msg");
      if (msg && msg.value) {
        alert(msg.value); 
      }
    </script>
  </main>
</body>
</html>
