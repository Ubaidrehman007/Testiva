<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::main})}">
<main>
  <section class="container py-5">
    <div class="row justify-content-center py-5">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg animate__animated animate__fadeIn">
          <div class="card-header bg-dark text-white text-center">
            <h3 class="mb-0">
              <i class="bi bi-person-lock me-2"></i>Admin Login
            </h3>
            <div th:if="${msg}" class="alert alert-warning alert-dismissible fade show mt-3" role="alert">
              <span th:text="${msg}"></span>
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          </div>

          <div class="card-body">
            <form action="/AdminLogin" method="post">
              <div class="mb-3">
                <label for="username" class="form-label">UserId</label>
                <input type="email" name="email" class="form-control" placeholder="Enter admin userid(email)" required>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                  <label class="form-check-label" for="rememberMe">Remember Me</label>
                </div>
                <a href="/admin-forgot-password" class="text-decoration-none text-primary fw-semibold">Forgot Password?</a>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-warning fw-bold text-dark">
                  <i class="bi bi-box-arrow-in-right me-1"></i>Login as Admin
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      border-radius: 12px;
      transition: all 0.3s ease-in-out;
    }

    .card-header {
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .card-body {
      padding: 2rem;
    }

    .form-control {
      border-radius: 8px;
      padding: 10px;
      font-size: 16px;
    }

    .btn-warning {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 16px;
    }

    .btn-warning:hover {
      background-color: #e0a800;
    }

    .alert {
      border-radius: 8px;
      font-weight: 500;
    }

    .form-check-input {
      cursor: pointer;
    }

    .form-check-label {
      margin-left: 4px;
      font-weight: 500;
    }

    a.text-primary {
      font-weight: 600;
      transition: color 0.2s;
    }

    a.text-primary:hover {
      color: #004080;
      text-decoration: underline;
    }

    .btn-close {
      outline: none;
      border: none;
    }
  </style>
</main>
</html>
