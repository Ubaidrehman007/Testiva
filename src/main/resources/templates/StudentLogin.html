<html th:replace="~{base::Layout(~{::main})}">
<main>
  <section class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg animate__animated animate__fadeIn">
          <div class="card-header bg-dark text-white text-center">
            <h3 class="mb-0">
              <i class="bi bi-box-arrow-in-right me-2"></i>Student Login
            </h3>
          </div>

          <div class="card-body">
            <form action="/StudentLogin" method="post">
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="student@example.com" required>
             
              </div>
              

              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
                  <label class="form-check-label" for="rememberMe">Remember Me</label>
                </div>
                <a href="/forgot-password" class="text-decoration-none text-primary fw-semibold">Forgot Password?</a>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary fw-bold">
                  <i class="bi bi-box-arrow-in-right me-1"></i>Login
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      border-radius: 12px;
      transition: all 0.3s ease-in-out;
    }

    .card-header {
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .card-body {
      padding: 2rem;
    }

    .form-control {
      border-radius: 8px;
      padding: 10px;
      font-size: 16px;
    }

    .btn-primary {
      background-color: #007bff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 16px;
    }

    .btn-primary:hover {
      background-color: #0056b3;
    }

    .alert {
      border-radius: 8px;
      font-weight: 500;
    }

    .form-check-input {
      cursor: pointer;
    }

    .form-check-label {
      margin-left: 4px;
      font-weight: 500;
    }

    a.text-primary {
      font-weight: 600;
      transition: color 0.2s;
    }

    a.text-primary:hover {
      color: #004080;
      text-decoration: underline;
    }
  </style>
   
   <input type="hidden" id="msg" th:if="${msg}" th:value ="${msg}">
        <script type="text/javascript">
        var msg = document.getElementById("msg");
        if(msg.value!="")
        	{
        	alert(msg.value);
        	}
        
        </script>
   
  
</main>
</html>
