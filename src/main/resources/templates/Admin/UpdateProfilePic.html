<html th:replace="~{Admin/Adminbase::layout(~{::main})}">
  <body>
    <main>
      <style>
        .update-pic-wrapper {
          max-width: 500px;
          margin: 40px auto;
          padding: 30px;
          background-color: #ffffff;
          border-radius: 12px;
          box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        .form-heading {
          text-align: center;
          font-size: 26px;
          font-weight: 700;
          margin-bottom: 30px;
          color: #343a40;
        }

        .update-pic-form label {
          font-weight: 600;
          color: #495057;
          margin-bottom: 10px;
        }

        .preview-container {
          width: 150px;
          height: 150px;
          margin: 20px auto;
          border-radius: 50%;
          overflow: hidden;
          box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        }

        .preview-img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .btn-success {
          width: 100%;
          padding: 10px;
          font-weight: 600;
        }
      </style>

      <div class="update-pic-wrapper">
        <h2 class="form-heading">🖼️ Change Profile Pic</h2>

        <form th:action="@{UpdateProfilePic}" method="post" enctype="multipart/form-data" class="update-pic-form">
          <div class="form-group">
            <label for="profilePic">Upload Profile Picture</label>
            <input
              type="file"
              name="profilePic"
              id="profilePic"
              class="form-control"
              accept="image/*"
              onchange="previewImage(event)"
              required
            />
          </div>

          <!-- Image Preview -->
          <div class="text-center">
            <div class="preview-container">
              <img
                id="preview"
                class="preview-img"
                src="/Images/user_img.jpg"
                alt="Profile Preview"
              />
            </div>
          </div>

          <button type="submit" class="btn btn-success mt-3">Update Picture</button>
        </form>
      </div>

      <script>
        function previewImage(event) {
          const input = event.target;
          const preview = document.getElementById('preview');

          if (input.files && input.files[0]) {
            const reader = new FileReader();

            reader.onload = function (e) {
              preview.src = e.target.result;
            };

            reader.readAsDataURL(input.files[0]);
          }
        }
        
        
        
      </script>
    </main>
  </body>
</html>
